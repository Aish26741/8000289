<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5 - Alignment and Reordering</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center text-primary mb-5">
        Alignment and Reordering Demo
    </h1>

    <!-- Exercise 5.1 -->

    <div class="row justify-content-center align-items-center bg-light"
         style="height:200px;">

        <div class="col-md-4 text-center">
            <div class="p-4 bg-success text-white rounded">
                Centered Content
            </div>
        </div>

    </div>

    <hr class="my-5">

    <!-- Exercise 5.2 -->

    <div class="row">

        <div class="col-md-6 order-md-2">
            <div class="p-4 bg-warning rounded">
                <h3>Image Section</h3>
                <p>
                    This section appears second on desktop screens.
                </p>
            </div>
        </div>

        <div class="col-md-6 order-md-1">
            <div class="p-4 bg-info rounded">
                <h3>Content Section</h3>
                <p>
                    This section appears first on desktop screens.
                </p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
