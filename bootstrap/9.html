<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9 - Buttons</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center text-primary mb-4">
        Bootstrap Buttons Showcase
    </h1>

    <!-- Exercise 9.1 -->

    <h3 class="mb-3">Contextual Buttons</h3>

    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-warning">Warning</button>
    <button class="btn btn-info">Info</button>
    <button class="btn btn-dark">Dark</button>

    <hr class="my-4">

    <h3 class="mb-3">Outline Buttons</h3>

    <button class="btn btn-outline-primary">Primary</button>
    <button class="btn btn-outline-success">Success</button>
    <button class="btn btn-outline-danger">Danger</button>
    <button class="btn btn-outline-dark">Dark</button>

    <hr class="my-4">

    <!-- Exercise 9.2 -->

    <h3 class="mb-3">Button Group</h3>

    <div class="btn-group">
        <button class="btn btn-primary">Home</button>
        <button class="btn btn-primary">Courses</button>
        <button class="btn btn-primary">Profile</button>
    </div>

    <hr class="my-4">

    <h3 class="mb-3">Toggle Buttons</h3>

    <input type="checkbox" class="btn-check" id="java">
    <label class="btn btn-outline-success" for="java">
        Java
    </label>

    <input type="checkbox" class="btn-check" id="python">
    <label class="btn btn-outline-primary" for="python">
        Python
    </label>

    <input type="checkbox" class="btn-check" id="webdev">
    <label class="btn btn-outline-warning" for="webdev">
        Web Development
    </label>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
