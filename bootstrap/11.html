<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 11 - Cards</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center text-primary mb-4">
        Bootstrap Cards and Media Layout
    </h1>

    <!-- Exercise 11.1 -->

    <div class="card mx-auto mb-5" style="width: 22rem;">

        <img src="https://picsum.photos/400/250"
             class="card-img-top"
             alt="Profile Image">

        <div class="card-body">

            <h4 class="card-title">
                Akshaya Varma
            </h4>

            <p class="card-text">
                BTech Student interested in Java Development,
                Web Technologies and Cloud Computing.
            </p>

            <button class="btn btn-primary">
                View Profile
            </button>

        </div>

    </div>

    <!-- Exercise 11.2 -->

    <div class="card">

        <div class="card-body d-flex align-items-center">

            <img src="https://picsum.photos/120"
                 class="me-3 rounded"
                 alt="Student">

            <div>

                <h4>
                    Java Full Stack Training
                </h4>

                <p class="mb-0">
                    Learn Java, Spring Boot, SQL and Frontend Development
                    through industry-oriented projects.
                </p>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
